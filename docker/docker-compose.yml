version: '3.9'

# ── How to use ─────────────────────────────────────────────────────────────────
# 1. Copy docker/.env.example → docker/.env and fill in your Firebase credentials
# 2. Run: docker compose up -d --build
#
# docker/.env is loaded automatically by Docker Compose.
# ──────────────────────────────────────────────────────────────────────────────

services:

  mysql:
    image: mysql:8.0
    container_name: iot_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: iot_platform
      MYSQL_USER: iotuser
      MYSQL_PASSWORD: iotpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    # Port 3306 not exposed to host — containers communicate internally.
    # Uncomment below only if you need external DB access and stop local MySQL first.
    # ports:
    #   - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: iot_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: iot_platform
      DB_USER: iotuser
      DB_PASSWORD: iotpassword
      JWT_SECRET: v5ymAY4GghtYSUxnyVYbladhoFPT6ele
      JWT_EXPIRES_IN: 7d
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      FRONTEND_URL: "*"
      # ── Firebase (backend token verification) ──
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      # ── SMTP (OTP email — set in docker/.env) ──
      SMTP_HOST:   ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:   ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER:   ${SMTP_USER}
      SMTP_PASS:   ${SMTP_PASS}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      # ── Firebase config baked into the Vite bundle at build time ──
      args:
        VITE_FIREBASE_API_KEY:     ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID:  ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_APP_ID:      ${VITE_FIREBASE_APP_ID}
    container_name: iot_frontend
    restart: unless-stopped
    volumes:
      - ./certs:/etc/ssl/iot:ro   # mkcert certs — trusted by browser, no warning
    ports:
      - "5173:443"   # HTTPS — access via https://localhost:5173
      - "5174:80"    # HTTP  — auto-redirects to HTTPS
    depends_on:
      - backend

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_logs:
