version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: iot_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: iot_platform
      MYSQL_USER: iotuser
      MYSQL_PASSWORD: iotpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: iot_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: iot_platform
      DB_USER: iotuser
      DB_PASSWORD: iotpassword
      JWT_SECRET: v5ymAY4GghtYSUxnyVYbladhoFPT6ele
      JWT_EXPIRES_IN: 7d
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      # '*' allows any LAN device (phone, Pi, laptop) to open the dashboard.
      # To restrict: set to your PC's LAN IP, e.g. http://192.168.1.100:5173
      FRONTEND_URL: "*"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_logs:
