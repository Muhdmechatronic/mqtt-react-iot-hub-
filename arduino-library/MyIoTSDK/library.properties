name=MyIoTSDK
version=2.0.0
author=IoT Platform
maintainer=IoT Platform
sentence=ESP32/ESP8266 client library for the IoT Platform — MQTT primary transport with automatic HTTP fallback.
paragraph=Full virtual pin system (V0–V255) for bidirectional dashboard synchronisation. Write sensor values with writePin()/writePins(), read dashboard-set values with readPin()/onPin() callbacks, handle MQTT command events with on(). Loop management, Wi-Fi keepalive, MQTT reconnect, and periodic HTTP state polling are handled automatically. Backward-compatible with the v1 send()/on() API.
category=Communication
url=https://github.com/your-repo/MyIoTSDK
architectures=esp32,esp8266
depends=PubSubClient (>=2.8),ArduinoJson (>=6.0)
