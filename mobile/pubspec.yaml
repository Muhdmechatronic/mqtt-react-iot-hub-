name: iot_companion
description: Flutter companion app for the IoT Sandbox Dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP client with interceptors
  dio: ^5.4.3+1

  # Real-time WebSocket sync
  socket_io_client: ^2.0.3+1

  # Secure JWT persistence
  flutter_secure_storage: ^9.2.1

  # Firebase Google Sign-In
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1

  # Charts
  fl_chart: ^0.68.0

  # Navigation
  go_router: ^14.2.0

  # Export
  excel: ^4.0.3
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
